<body>

<div id="app"></div>

<script>
'use strict';

// ============================================================
// State encoding/decoding
// ============================================================
function encodeState(state) {
  const json = JSON.stringify(state);
  const compressed = pako.deflate(json);
  return base64urlFromBytes(compressed);
}

function decodeState(encoded) {
  const bytes = bytesFromBase64url(encoded);
  const json = pako.inflate(bytes, { to: 'string' });
  return JSON.parse(json);
}

function base64urlFromBytes(bytes) {
  let binary = '';
  for (let i = 0; i < bytes.length; i++) {
    binary += String.fromCharCode(bytes[i]);
  }
  return btoa(binary)
    .replace(/\+/g, '-')
    .replace(/\//g, '_')
    .replace(/=+$/, '');
}

function bytesFromBase64url(str) {
  let b64 = str.replace(/-/g, '+').replace(/_/g, '/');
  while (b64.length % 4) b64 += '=';
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) {
    bytes[i] = binary.charCodeAt(i);
  }
  return bytes;
}

// ============================================================
// Routing
// ============================================================
function getCurrentState() {
  const hash = location.hash.slice(1);
  if (!hash) return null;
  try {
    return decodeState(hash);
  } catch (e) {
    console.error('Failed to decode state:', e);
    return null;
  }
}

function pushState(state) {
  const encoded = encodeState(state);
  location.hash = encoded;
  // hashchange will trigger re-render
}

// ============================================================
// Helpers
// ============================================================
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  })[c]);
}

function elapsedString(seconds) {
  seconds = Math.floor(seconds);
  if (seconds < 60) return `${seconds}秒前`;
  if (seconds < 3600) return `${Math.floor(seconds / 60)}分前`;
  if (seconds < 86400) return `${Math.floor(seconds / 3600)}時間前`;
  return `${Math.floor(seconds / 86400)}日前`;
}

function formatDateTime(ts) {
  const d = new Date(ts * 1000);
  const m = d.getMonth() + 1;
  const day = d.getDate();
  const hh = d.getHours();
  const mm = String(d.getMinutes()).padStart(2, '0');
  return `${m}/${day} ${hh}:${mm}`;
}

function showToast(message) {
  // remove any existing toast first
  document.querySelectorAll('.toast').forEach(t => t.remove());
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = message;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2400);
}

function nowSeconds() {
  return Math.floor(Date.now() / 1000);
}

// ============================================================
// localStorage: my name + task list
// ============================================================
const LS_NAME_KEY = 'tpp_my_name';
const LS_TASKS_KEY = 'tpp_tasks';

function getMyName() {
  try { return localStorage.getItem(LS_NAME_KEY) || ''; } catch (e) { return ''; }
}
function setMyName(name) {
  try { localStorage.setItem(LS_NAME_KEY, name); } catch (e) {}
}

function getStoredTasks() {
  try { return JSON.parse(localStorage.getItem(LS_TASKS_KEY) || '[]'); } catch (e) { return []; }
}
function saveStoredTasks(tasks) {
  try { localStorage.setItem(LS_TASKS_KEY, JSON.stringify(tasks)); } catch (e) {}
}

function taskIdOf(state) {
  return state.c + '|' + state.p1 + '|' + state.p2;
}

function recordTask(state) {
  const tasks = getStoredTasks();
  const id = taskIdOf(state);
  const lastMove = state.h[state.h.length - 1];
  const idx = tasks.findIndex(t => t.id === id);
  const isNewer = idx < 0 || lastMove.ts >= (tasks[idx].lastActivity || 0);
  if (idx < 0) {
    tasks.push({
      id, url: location.href, title: state.t, p1: state.p1, p2: state.p2,
      owner: state.o, lastActivity: lastMove.ts, createdAt: state.c,
      completed: false, visitedAt: nowSeconds()
    });
  } else if (isNewer) {
    tasks[idx] = Object.assign(tasks[idx], {
      url: location.href, title: state.t, owner: state.o,
      lastActivity: lastMove.ts, visitedAt: nowSeconds()
    });
  } else {
    tasks[idx].visitedAt = nowSeconds();
  }
  saveStoredTasks(tasks);
}

function categorizeTasks() {
  const myName = getMyName();
  const tasks = getStoredTasks();
  const result = { mine: [], theirs: [], completed: [] };
  tasks.forEach(t => {
    if (t.completed) { result.completed.push(t); return; }
    const isMineByP1 = (myName === t.p1 && t.owner === 'p1');
    const isMineByP2 = (myName === t.p2 && t.owner === 'p2');
    if (isMineByP1 || isMineByP2) result.mine.push(t);
    else result.theirs.push(t);
  });
  result.mine.sort((a, b) => a.lastActivity - b.lastActivity);  // most stale first
  result.theirs.sort((a, b) => b.lastActivity - a.lastActivity);
  result.completed.sort((a, b) => b.lastActivity - a.lastActivity);
  return result;
}

function editMyName() {
  const current = getMyName();
  const newName = prompt('あなたの名前を入力してください', current);
  if (newName !== null) {
    setMyName(newName.trim());
    render();
  }
}

function toggleComplete(id, ev) {
  if (ev) { ev.preventDefault(); ev.stopPropagation(); }
  const tasks = getStoredTasks();
  const t = tasks.find(t => t.id === id);
  if (t) { t.completed = !t.completed; saveStoredTasks(tasks); render(); }
}

function deleteStoredTask(id, ev) {
  if (ev) { ev.preventDefault(); ev.stopPropagation(); }
  if (!confirm('このタスクを一覧から削除しますか？\n（URL自体は残ります）')) return;
  saveStoredTasks(getStoredTasks().filter(t => t.id !== id));
  render();
}

function completeFromCourt() {
  const state = getCurrentState();
  if (!state) return;
  const tasks = getStoredTasks();
  const id = taskIdOf(state);
  const t = tasks.find(t => t.id === id);
  if (t) {
    t.completed = !t.completed;
    saveStoredTasks(tasks);
    showToast(t.completed ? '完了マークしました' : '完了マークを外しました');
    render();
  }
}

function renderTaskList(myName) {
  const cat = categorizeTasks();
  const renderCard = (t, kind) => {
    const sec = nowSeconds() - t.lastActivity;
    const stale = elapsedString(sec);
    const otherName = (myName === t.p1) ? t.p2 : (myName === t.p2 ? t.p1 : `${t.p1}↔${t.p2}`);
    return `
      <div class="task-card">
        <a class="task-card-link" href="${escapeHtml(t.url)}">
          <div class="task-title">${escapeHtml(t.title)}</div>
          <div class="task-meta">${escapeHtml(otherName)} ・ <span class="stale">${stale}</span></div>
        </a>
        <button class="task-action" title="完了/未完了切替" onclick="toggleComplete('${escapeHtml(t.id)}', event)">${t.completed ? '↩' : '✓'}</button>
        <button class="task-action" title="一覧から削除" onclick="deleteStoredTask('${escapeHtml(t.id)}', event)">×</button>
      </div>
    `;
  };
  const section = (kind, label, items, openByDefault) => {
    const empty = items.length === 0 ? 'empty' : '';
    return `
      <details class="${kind} ${empty}" ${openByDefault && items.length ? 'open' : ''}>
        <summary>
          <span>${label}</span>
          <span class="summary-count">${items.length}</span>
        </summary>
        ${items.length === 0 ? '<div class="empty-text">なし</div>' : items.map(t => renderCard(t, kind)).join('')}
      </details>
    `;
  };
  const total = cat.mine.length + cat.theirs.length + cat.completed.length;
  if (total === 0) return '';
  return `
    <div class="task-list">
      ${section('mine', '🔴 あなたのコート', cat.mine, true)}
      ${section('theirs', '⚪ 相手のコート', cat.theirs, false)}
      ${section('done', '✅ 完了済み', cat.completed, false)}
    </div>
  `;
}

// ============================================================
// Render: Setup
// ============================================================
let setupBallSide = 'p2'; // initially the ball is in the receiver's court (you sent it)

function renderSetup() {
  document.body.className = 'setup';
  const myName = getMyName();
  const taskListHtml = renderTaskList(myName);
  const mySectionHtml = (myName || taskListHtml) ? `
      <div class="my-section">
        <span class="my-name-display">👤 あなた: <b>${escapeHtml(myName || '未登録')}</b></span>
        <button class="my-edit-btn" onclick="editMyName()">${myName ? '変更' : '登録'}</button>
      </div>
  ` : '';
  document.getElementById('app').innerHTML = `
    <div class="setup-screen">
      <h1>🏓 Task PingPong</h1>
      <p class="tagline">「次は私の番？相手の番？」を、URLに書く。</p>
      <p class="subtagline">2人のやり取り専用・アカウント不要・3秒で始まる。</p>

      ${mySectionHtml}
      ${taskListHtml}

      <div class="how-card">
        <h3>つかい方</h3>
        <div class="how-step">
          <div class="how-num">1</div>
          <div class="how-text">
            <b>タスクを作る</b>
            <span>件名と2人の名前を入力。URLが発行されます。</span>
          </div>
        </div>
        <div class="how-arrow">↓</div>
        <div class="how-step">
          <div class="how-num">2</div>
          <div class="how-text">
            <b>URLをChatworkに貼る</b>
            <span>「いま誰のボールか」が一目でわかります。</span>
          </div>
        </div>
        <div class="how-arrow">↓</div>
        <div class="how-step">
          <div class="how-num">3</div>
          <div class="how-text">
            <b>相手が打ち返す</b>
            <span>新しいURLを貼り返してきて、ボールが戻ります。</span>
          </div>
        </div>
      </div>

      <div class="usecase-card">
        <h3>こんな往復に</h3>
        <ul>
          <li>📄 提案書ドラフトのレビュー往復</li>
          <li>🎫 イベント運営の物販フライヤー回収・確認</li>
          <li>✏️ クライアントとの修正出し → 確認</li>
        </ul>
      </div>

      <div class="form-card">
        <label for="title">タスクの件名</label>
        <input type="text" id="title" placeholder="例：提案書ドラフトのレビュー" maxlength="80" />

        <label for="p1">あなたの名前</label>
        <input type="text" id="p1" placeholder="例：イヌザキ" maxlength="20" value="${escapeHtml(myName)}" />

        <label for="p2">相手の名前</label>
        <input type="text" id="p2" placeholder="例：サトウさん" maxlength="20" />

        <label>最初にボールを持っているのは？</label>
        <div class="ball-side">
          <button type="button" data-side="p1" onclick="setSide('p1')">あなた</button>
          <button type="button" data-side="p2" onclick="setSide('p2')" class="active">相手</button>
        </div>

        <button class="primary-btn" onclick="createTask()">🏓 ボールを投げる</button>
      </div>

      <div class="author-note">
        IS部門責任者 × アニソン/VTuber DJの自分が、Chatworkで埋もれる現場の往復を解決したくて作りました。β版です。
      </div>

      <div class="info">
        ⚪︎ アカウント不要・サーバーに何も保存されません。<br>
        ⚪︎ タスクの状態はURLそのものに記録されます。URLをChatworkに貼るだけで相手にボールが渡ります。<br>
        ⚪︎ 機密情報は入力しないでください（URLを知っている人は誰でも見られます）。
      </div>
    </div>
  `;
}

function setSide(side) {
  setupBallSide = side;
  document.querySelectorAll('.ball-side button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.side === side);
  });
}

function createTask() {
  const title = document.getElementById('title').value.trim();
  const p1 = document.getElementById('p1').value.trim();
  const p2 = document.getElementById('p2').value.trim();
  if (!title || !p1 || !p2) {
    showToast('全項目を入力してください');
    return;
  }
  // Save my name (the creator's name = p1) for future use
  setMyName(p1);
  const ts = nowSeconds();
  const state = {
    v: 1,
    t: title,
    c: ts,
    p1: p1,
    p2: p2,
    o: setupBallSide,
    h: [
      { ts: ts, by: 'p1', n: '作成' }
    ]
  };
  pushState(state);
}

// ============================================================
// Render: Court (main view)
// ============================================================
function renderCourt(state) {
  document.body.className = `court-${state.o}`;

  // Auto-record this task in localStorage
  recordTask(state);

  const ownerName = state.o === 'p1' ? state.p1 : state.p2;
  const lastMove = state.h[state.h.length - 1];
  const elapsedSec = nowSeconds() - lastMove.ts;
  const returnsCount = state.h.length - 1; // exclude initial creation
  const taskId = taskIdOf(state);
  const stored = getStoredTasks().find(t => t.id === taskId);
  const isCompleted = stored && stored.completed;

  const historyHtml = [...state.h].reverse().map(h => {
    const byName = h.by === 'p1' ? state.p1 : state.p2;
    return `
      <div class="hist-item">
        <span class="hist-dot ${h.by}"></span>
        <div>
          <span class="hist-by">${escapeHtml(byName)}</span>
          <span class="hist-time">${formatDateTime(h.ts)}</span>
          <div class="hist-note">${escapeHtml(h.n)}</div>
        </div>
      </div>
    `;
  }).join('');

  document.getElementById('app').innerHTML = `
    <div class="court-view">
      <div class="top-bar">
        <span>🏓 Task PingPong</span>
        <span>往復 ${returnsCount}回</span>
      </div>

      <div class="ball-icon">🏓</div>
      <div class="ball-label">いまボールを持っているのは</div>
      <div class="ball-owner">${escapeHtml(ownerName)}<span class="suffix">のコート</span></div>
      <div class="elapsed-wrap">
        <span class="elapsed-pill">⏱ ${elapsedString(elapsedSec)}</span>
      </div>

      <div class="task-card">
        <div class="task-title">${escapeHtml(state.t)}</div>
        <div class="task-meta">
          <span>${escapeHtml(state.p1)} ↔ ${escapeHtml(state.p2)}</span>
          <span>作成 ${formatDateTime(state.c)}</span>
        </div>
      </div>

      <div class="history-card">
        <h3>履歴</h3>
        ${historyHtml}
      </div>

      <div class="return-card">
        <textarea id="note" placeholder="メモ（例：レビュー完了しました／A案で進めます／追加で確認お願いします）" maxlength="200"></textarea>
        <button class="return-btn" onclick="returnBall()">🏓 私が打ち返した（ボールを相手のコートへ）</button>
        <div class="secondary-actions">
          <button class="secondary-btn" onclick="copyForChatwork()">📋 Chatwork用にコピー</button>
          <button class="secondary-btn" onclick="newTask()">＋ 新しいタスク</button>
        </div>
      </div>

      <div class="complete-row">
        <button class="complete-btn ${isCompleted ? 'completed' : ''}" onclick="completeFromCourt()">
          ${isCompleted ? '✅ 完了済み（戻す）' : '✓ このタスクを完了にする'}
        </button>
      </div>

      <div class="url-warning">
        URLにすべての状態が含まれます。新URL発行のたびに最新版を共有してください。
      </div>

      <div class="footer">
        🏓 Task PingPong — URLが、ボール。
      </div>
    </div>
  `;
}

function returnBall() {
  const state = getCurrentState();
  if (!state) return;
  const noteEl = document.getElementById('note');
  const note = noteEl.value.trim() || '打ち返し';
  // The current owner is the one who is now returning the ball
  const sender = state.o;
  const newOwner = state.o === 'p1' ? 'p2' : 'p1';
  state.h.push({
    ts: nowSeconds(),
    by: sender,
    n: note
  });
  state.o = newOwner;
  pushState(state);
  // Auto-copy after returning
  setTimeout(() => copyForChatwork(true), 200);
}

function copyForChatwork(afterReturn) {
  const state = getCurrentState();
  if (!state) return;
  const url = location.href;
  const ownerName = state.o === 'p1' ? state.p1 : state.p2;
  const lastNote = state.h[state.h.length - 1].n;
  const message = `🏓 [${state.t}]\n→ ${ownerName}さんのコートです（${lastNote}）\n${url}`;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(message).then(() => {
      showToast(afterReturn ? '打ち返し完了！Chatwork用メッセージをコピーしました' : 'Chatwork用メッセージをコピーしました');
    }).catch(() => {
      fallbackCopy(message);
    });
  } else {
    fallbackCopy(message);
  }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try {
    document.execCommand('copy');
    showToast('クリップボードにコピーしました');
  } catch (e) {
    showToast('コピーできませんでした。手動で選択してください');
  }
  ta.remove();
}

function newTask() {
  if (confirm('新しいタスクを作りますか？\n（現在のタスクのURLは変わらず残ります）')) {
    location.hash = '';
  }
}

// ============================================================
// Main render dispatcher
// ============================================================
function render() {
  const state = getCurrentState();
  if (!state) {
    renderSetup();
  } else {
    renderCourt(state);
  }
}

// ============================================================
// Auto-update elapsed time every minute
// ============================================================
setInterval(() => {
  const state = getCurrentState();
  if (state) {
    const elapsedEl = document.querySelector('.elapsed-pill');
    if (elapsedEl) {
      const lastMove = state.h[state.h.length - 1];
      const elapsedSec = nowSeconds() - lastMove.ts;
      elapsedEl.textContent = `⏱ ${elapsedString(elapsedSec)}`;
    }
  }
}, 60000);

// ============================================================
// Init
// ============================================================
window.addEventListener('hashchange', render);
window.addEventListener('DOMContentLoaded', render);
if (document.readyState !== 'loading') render();

// Expose functions for inline onclick (since we're not using a bundler)
window.setSide = setSide;
window.createTask = createTask;
window.returnBall = returnBall;
window.copyForChatwork = copyForChatwork;
window.newTask = newTask;
window.editMyName = editMyName;
window.toggleComplete = toggleComplete;
window.deleteStoredTask = deleteStoredTask;
window.completeFromCourt = completeFromCourt;
</script>

</body>
</html>
